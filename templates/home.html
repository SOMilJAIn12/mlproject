<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Student Predictor Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #6366f1; /* Indigo shade */
            --accent-hover: #4f46e5;
            --glass: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .predictor-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header-section {
            background: rgba(255, 255, 255, 0.03);
            padding: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .header-section h1 {
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .form-container {
            padding: 2.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin-bottom: 0.75rem;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white !important;
            border-radius: 12px;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            outline: none;
        }

        .form-select option {
            background: var(--bg-dark);
            color: white;
        }

        .btn-predict {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            margin-top: 1rem;
        }

        .btn-predict:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
        }

        /* Result Animation */
        .result-wrapper {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 16px;
            background: linear-gradient(45deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            text-align: center;
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 15px rgba(99, 102, 241, 0.6);
        }
        ::placeholder {
            color: #ffffff !important;
            opacity: 0.7;
        }
        /* Responsive Tweaks */
        @media (max-width: 768px) {
            .form-container { padding: 1.5rem; }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
            <div class="predictor-card animate__animated animate__fadeInUp">
                
                <div class="header-section">
                    <h1><i class="fas fa-brain me-2"></i>EduPredict AI</h1>
                    <p style="color: white;">High-precision Student Performance Analytics</p>
                </div>

                <div class="form-container">
                    <form action="/predictdata" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Student Gender</label>
                                <select name="gender" class="form-select" required>
                                    <option value="" selected disabled>Identify Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label" style="margin-bottom:2px;">DEMOGRAPHIC GROUP</label>
                                <small style="color:#94a3b8; display:block; margin-top:-4px;">
                                    (Dataset category — just select any)
                                </small>
                                <select name="race_ethnicity" class="form-select" required>
                                    <option value="" selected disabled>Select Ethnicity</option>
                                    <option value="group A">Group A</option>
                                    <option value="group B">Group B</option>
                                    <option value="group C">Group C</option>
                                    <option value="group D">Group D</option>
                                    <option value="group E">Group E</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Parental Education Background</label>
                                <select name="parental_level_of_education" class="form-select" required>
                                    <option value="" selected disabled>Select Qualification</option>
                                    <option value="some high school">Some High School</option>
                                    <option value="high school">High School</option>
                                    <option value="some college">Some College</option>
                                    <option value="associate's degree">Associate Degree</option>
                                    <option value="bachelor's degree">Bachelor Degree</option>
                                    <option value="master's degree">Master Degree</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Socioeconomic Status (Lunch)</label>
                                <select name="lunch" class="form-select" required>
                                    <option value="" selected disabled>Select Plan</option>
                                    <option value="standard">Standard</option>
                                    <option value="free/reduced">Free/Reduced</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Test Preparation</label>
                                <select name="test_preparation_course" class="form-select" required>
                                    <option value="" selected disabled>Course Status</option>
                                    <option value="none">None</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Writing Proficiency</label>
                                <input type="number" name="writing_score" class="form-control" placeholder="0-100" min="0" max="100" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Reading Proficiency</label>
                                <input type="number" name="reading_score" class="form-control" placeholder="0-100" min="0" max="100" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-predict text-white mt-5">
                            <i class="fas fa-microchip me-2"></i> Execute Prediction
                        </button>
                    </form>

                    {% if results %}
                    <div class="result-wrapper animate__animated animate__zoomIn">
                        <p class="text-uppercase mb-1" style="color: #818cf8; font-size: 0.75rem; letter-spacing: 2px;">Predicted Mathematics Score</p>
                        <div class="score-display">
                            {{ results }}<span style="font-size: 1rem; color: #94a3b8; margin-left: 5px;">/ 100</span>
                        </div>
                    </div>
                    {% endif %}
                </div>
            </div>
            
            <p class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
                Powered by Advanced Machine Learning Architecture
            </p>
        </div>
    </div>
</div>

</body>
</html>
